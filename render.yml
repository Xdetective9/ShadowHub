services:
  - type: web
    name: shadowhub
    env: node
    region: singapore
    plan: free
    buildCommand: yarn install --frozen-lockfile || yarn install
    startCommand: yarn start
    healthCheckPath: /health
    healthCheckTimeout: 60
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: OWNER_NAME
        value: Abdullah
      - key: OWNER_NUMBER
        value: "+923288055104"
      - key: ADMIN_PASSWORD
        sync: false
