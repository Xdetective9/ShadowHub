services:
  - type: web
    name: shadowhub
    env: node
    region: singapore
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: OWNER_NAME
        value: Abdullah
      - key: OWNER_NUMBER
        value: "+923288055104"
      - key: ADMIN_PASSWORD
        sync: false  # Set manually in Render dashboard for security
      - key: DATABASE_URL
        sync: false  # Optional - leave blank for JSON-only mode
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "200"
